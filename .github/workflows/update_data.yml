name: Update Therapist Data

on:
  schedule:
    # Runs at 00:00 UTC on the 1st of every month
    - cron: '0 0 1 * *'
  # Allows you to trigger the workflow manually from the Actions tab
  workflow_dispatch: 

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install playwright
          python -m playwright install --with-deps chromium
          # add_latlon.py uses standard libraries (urllib, json, csv), so no extra pip installs are needed for it.

      - name: Scrape ESDM Therapists
        run: python scrape_therapists.py

      - name: Geocode Addresses
        # This step takes about 30 minutes due to Nominatim rate limiting (1 sec per request)
        run: python add_latlon.py

      - name: Update 'last updated' date in files
        run: |
          TODAY=$(date +'%B %-d, %Y')
          sed -i "s/The data was last updated [A-Za-z0-9, ]*\./The data was last updated $TODAY./" index.html
          sed -i "s/The data was last updated [A-Za-z0-9, ]*\./The data was last updated $TODAY./" app.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data.tsv data_w_latlon.tsv index.html app.py
          
          # Only commit and push if there are actual changes
          if ! git diff --staged --quiet; then
            git commit -m "Automated data update: $(date +'%Y-%m-%d')"
            git pull --rebase origin main
            git push
          else
            echo "No changes to commit."
          fi
